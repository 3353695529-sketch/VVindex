<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VV の 小站</title>

<link rel="icon" href="https://mpimg.cn/view.php/a0c03f671b7acdf7a81c7c4c3f88d478.ico">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", "Microsoft YaHei";
    color: white;
    text-align: center;
    transition: 0.3s;
}

/* 背景 */
body.bg {
    background-size: cover;
    background-position: center;
}

/* 卡片 */
.card {
    margin: 80px auto;
    padding: 30px;
    width: 360px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(255,100,200,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* 头像 */
.avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.6);
}

/* 标题 */
h2 {
    margin: 10px 0;
    text-shadow: 0 0 10px #ff6ec7;
}

/* 按钮 */
button, a {
    display: inline-block;
    margin: 8px;
    padding: 10px 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #ff6ec7, #6ec7ff);
    color: white;
    text-decoration: none;
    cursor: pointer;
}

/* 夜间模式 */
.dark {
    background: #0a0a0a !important;
}

/* 网易云 */
.music-box {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

/* 📱 手机适配 */
@media (max-width: 600px) {

    .card {
        width: 90%;
        margin: 40px auto;
        padding: 20px;
    }

    .avatar {
        width: 80px;
        height: 80px;
    }

    button, a {
        display: block;
        width: 80%;
        margin: 10px auto;
    }

    .music-box {
        right: 50%;
        transform: translateX(50%);
        bottom: 10px;
        width: 90%;
    }

    .music-box iframe {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="card">
    <img id="avatar" class="avatar">
    <h2 id="name"></h2>
    <p id="bio"></p>

    <button onclick="toggleDark()">🌙 夜间</button>
    <button onclick="toggleMusic()">🎵 音乐</button>

    <br>

    <a href="https://github.com/3353695529-sketch" target="_blank">💻 GitHub</a>
    <a href="https://space.bilibili.com/577581928?spm_id_from=333.1007.0.0" target="_blank">📺 B站</a>
</div>

<!-- 网易云播放器 -->
<div class="music-box">
    <iframe frameborder="no"
    width="280" height="80"
    src="https://music.163.com/outchain/player?type=2&id=3373416911&auto=0&height=66">
    </iframe>
</div>

<audio id="music"></audio>

<script>
let playing = false;

// 读取配置
fetch('config.json')
.then(res => res.json())
.then(cfg => {

    document.getElementById("name").innerText = cfg.name;
    document.getElementById("bio").innerText = cfg.bio;
    document.getElementById("avatar").src = cfg.avatar;

    document.body.style.backgroundImage = `url('${cfg.background}')`;
    document.body.classList.add("bg");

    document.getElementById("music").src = cfg.music;

    // 👇 链接（你可以在 config.json 改）
    document.getElementById("github").href = cfg.github;
    document.getElementById("bilibili").href = cfg.bilibili;
});

// 夜间模式
function toggleDark() {
    document.body.classList.toggle("dark");
}

// 音乐控制
function toggleMusic() {
    const m = document.getElementById("music");
    if (playing) {
        m.pause();
    } else {
        m.play().catch(()=>{});
    }
    playing = !playing;
}
</script>

</body>
</html>
