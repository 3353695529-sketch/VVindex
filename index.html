<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>VV的个人网站</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    color: white;
    transition: 0.3s;
}

.container {
    background: rgba(0,0,0,0.6);
    margin: 60px auto;
    padding: 40px;
    width: 60%;
    border-radius: 20px;
}

.profile img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
}

.links a {
    display: inline-block;
    margin: 10px;
    padding: 12px 20px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    text-decoration: none;
    color: white;
}

button {
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.dark {
    color: #ddd;
}

.dark .container {
    background: rgba(20,20,20,0.8);
}
</style>
</head>

<body>

<div class="container">
    <div class="profile">
        <img id="avatar">
        <h2 id="name"></h2>
        <p id="bio"></p>
    </div>

    <button onclick="toggleDark()">🌙 夜间模式</button>
    <button onclick="toggleMusic()">🎵 音乐</button>

    <div class="links">
        <a href="https://github.com" target="_blank">GitHub</a>
        <a href="https://www.bilibili.com" target="_blank">B站</a>
    </div>

    <audio id="music" loop></audio>
</div>

<script>
let playing = false;

// 读取配置
fetch('config.json')
.then(res => res.json())
.then(cfg => {

    document.getElementById("name").innerText = cfg.name;
    document.getElementById("bio").innerText = cfg.bio;
    document.getElementById("avatar").src = cfg.avatar;

    document.body.style.background =
        `url('${cfg.background}') no-repeat center center/cover`;

    document.getElementById("music").src = cfg.music;
});

// 夜间模式
function toggleDark() {
    document.body.classList.toggle("dark");
}

// 音乐
function toggleMusic() {
    const m = document.getElementById("music");
    if (playing) {
        m.pause();
    } else {
        m.play();
    }
    playing = !playing;
}
</script>

</body>
</html>
