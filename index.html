<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>VV的网站</title>

<!-- 图标 -->
<link rel="icon" href="vv.ico">

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: #000;
}

/* 背景 */
body.bg {
    background-size: cover;
    background-position: center;
}

/* 卡片 */
.card {
    margin: 100px auto;
    padding: 30px;
    width: 350px;
    background: rgba(0,0,0,0.5);
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

/* 头像 */
.avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
}

/* 按钮 */
button, a {
    display: inline-block;
    margin: 10px;
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    text-decoration: none;
    cursor: pointer;
}

/* 夜间模式 */
.dark {
    background: #111 !important;
}

/* 网易云播放器（悬浮） */
.music-box {
    position: fixed;
    bottom: 20px;
    right: 20px;
}
</style>
</head>

<body>

<div class="card">
    <img id="avatar" class="avatar">
    <h2 id="name"></h2>
    <p id="bio"></p>

    <button onclick="toggleDark()">🌙 夜间模式</button>
    <button onclick="toggleMusic()">🎵 音乐开关</button>

    <br>

    <a href="https://github.com" target="_blank">GitHub</a>
    <a href="https://www.bilibili.com" target="_blank">B站</a>
</div>

<!-- 网易云播放器 -->
<div class="music-box">
    <iframe frameborder="no" border="0" marginwidth="0" marginheight="0"
    width=300 height=86
    src="https://music.163.com/outchain/player?type=2&id=3373416911&auto=0&height=66">
    </iframe>
</div>

<!-- 隐藏audio（可选备用） -->
<audio id="music"></audio>

<script>
let playing = false;

// 读取配置
fetch('config.json')
.then(res => res.json())
.then(cfg => {

    document.getElementById("name").innerText = cfg.name;
    document.getElementById("bio").innerText = cfg.bio;
    document.getElementById("avatar").src = cfg.avatar;

    document.body.style.backgroundImage = `url('${cfg.background}')`;
    document.body.classList.add("bg");

    document.getElementById("music").src = cfg.music; // 本地备用
});

// 夜间模式
function toggleDark() {
    document.body.classList.toggle("dark");
}

// 音乐按钮（控制本地 audio，不影响网易云）
function toggleMusic() {
    const m = document.getElementById("music");
    if (playing) {
        m.pause();
    } else {
        m.play().catch(()=>{});
    }
    playing = !playing;
}
</script>

</body>
</html>
